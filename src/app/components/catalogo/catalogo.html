<section class="catalogo-section py-5">
  <div class="container">
    <h2 class="display-5 fw-bold text-center mb-2 brand-title">NUESTROS PRODUCTOS</h2>
    <p class="text-center text-muted mb-5">Calidad garantizada en cada par</p>

    <div class="d-flex justify-content-center gap-2 mb-5 flex-wrap">
      <button (click)="filtrar('todos')" [class.active]="categoriaActual === 'todos'" class="btn btn-filter">Todos</button>
      <button (click)="filtrar('masculino')" [class.active]="categoriaActual === 'masculino'" class="btn btn-filter">Masculino</button>
      <button (click)="filtrar('femenino')" [class.active]="categoriaActual === 'femenino'" class="btn btn-filter">Femenino</button>
    </div>

    <div class="row g-4">
      <div class="col-6 col-md-4 col-lg-3" *ngFor="let producto of productosFiltrados">
        <div class="product-card">
          <div class="product-img-container">
            <img [src]="producto.imagen" [alt]="producto.nombre" class="product-img">
            <span class="badge-category">{{ producto.categoria }}</span>
          </div>
          
          <div class="product-info p-3">
            <h5 class="product-name">{{ producto.nombre }}</h5>
            <p class="product-desc">{{ producto.descripcion }}</p>
            <div class="d-flex justify-content-between align-items-center mt-3">
              <span class="product-price">${{ producto.precio | number }}</span>
              <button (click)="agregarAlCarrito(producto)" class="btn-add-cart">
                <i class="bi bi-bag-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Modal de confirmación al agregar al carrito -->
<div *ngIf="productoAgregado()" class="modal fade show d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);" (click)="productoAgregado.set(null)">
  <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
    <div class="modal-content border-0 rounded-4 shadow-lg">
      <div class="modal-header bg-success text-white border-0 rounded-top-4">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-check-circle-fill me-2"></i>¡Producto agregado!
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="productoAgregado.set(null)"></button>
      </div>
      <div class="modal-body text-center p-4">
        <img *ngIf="productoAgregado()" [src]="productoAgregado()!.imagen" class="rounded-3 mb-3 shadow-sm" style="width: 80px; height: 80px; object-fit: cover;">
        <h6 class="fw-bold">{{ productoAgregado()!.nombre }}</h6>
        <p class="text-muted mb-0">Se ha agregado correctamente a tu carrito.</p>
      </div>
      <div class="modal-footer border-0 d-flex justify-content-center p-4">
        <button type="button" class="btn btn-primary rounded-pill px-4" (click)="productoAgregado.set(null)">¡Genial!</button>
      </div>
    </div>
  </div>
</div>
